<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World Tool</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff !important;
      font-family: Arial, sans-serif;
    }

    body {
      background: #ffffff !important;
    }

    .custom-app {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
      border: none !important;
      border-radius: 0 !important;
      background: #ffffff !important;
      box-shadow: none !important;
      box-sizing: border-box;
    }

    .custom-app h1 {
      margin-top: 0;
      text-align: center;
    }

    .custom-app p {
      text-align: center;
      margin-bottom: 20px;
    }

    .custom-app label {
      display: block;
      margin-bottom: 8px;
    }

    .custom-app textarea {
      width: 100%;
      min-height: 220px;
      padding: 12px;
      border: 1px solid #bbbbbb;
      border-radius: 8px;
      box-sizing: border-box;
      resize: vertical;
      font-size: 16px;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    .button-row {
      text-align: center;
      margin-top: 16px;
    }

    .button-row button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      background: #2d6cdf;
      color: white;
    }
  </style>
</head>
<body>
  <div class="custom-app">
    <h1>Hello World</h1>
    <p>Gib einen Text ein und lade ihn direkt als Datei herunter.</p>

    <label for="meinText"><strong>Text eingeben:</strong></label>
    <textarea id="meinText" rows="10" placeholder="Hier deinen Text eingeben..."></textarea>

    <div class="button-row">
      <button type="button" onclick="downloadTextDatei()">Text herunterladen</button>
    </div>
  </div>

  <script src="download.js"></script>
</body>
</html>
