<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transkript-Feedback</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: #ffffff;
    }

    .custom-app {
      width: min(980px, 100%);
      padding: 36px 24px 48px;
      margin: 0 auto;
      box-sizing: border-box;
      background: #ffffff;
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 2.2rem;
    }

    .intro {
      text-align: center;
      margin: 0 0 24px;
      color: #333;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      padding: 14px;
      border: 1px solid #bbbbbb;
      border-radius: 8px;
      box-sizing: border-box;
      resize: vertical;
      font-size: 16px;
      font-family: Arial, sans-serif;
      background: #ffffff;
      line-height: 1.5;
    }

    .button-row {
      text-align: center;
      margin-top: 18px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      background: #2d6cdf;
      color: white;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status-box {
      margin-top: 16px;
      text-align: center;
      color: #444;
      min-height: 24px;
      line-height: 1.4;
    }

    .response-box {
      margin-top: 26px;
      padding: 18px;
      border: 1px solid #dddddd;
      border-radius: 8px;
      background: #fafafa;
      display: none;
    }

    .response-title {
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 1.05rem;
    }

    .response-text {
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .note {
      margin-top: 16px;
      font-size: 13px;
      color: #666;
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="custom-app">
    <h1>Transkript-Feedback</h1>
    <p class="intro">
      Füge hier ein Gesprächstranskript ein. Das Modell reagiert in der Rolle
      eines Fachleiters und gibt kurzes, strukturiertes Feedback.
    </p>

    <label for="meinText">Transkript eingeben:</label>
    <textarea
      id="meinText"
      placeholder="Hier das Transkript einfügen ..."
    ></textarea>

    <div class="button-row">
      <button id="sendBtn" type="button">Analysieren</button>
    </div>

    <div id="status" class="status-box"></div>

    <div id="responseBox" class="response-box">
      <div class="response-title">Feedback</div>
      <div id="responseText" class="response-text"></div>
    </div>

    <div class="note">
      Hinweis: Das Modell läuft lokal im Browser. Der erste Start kann etwas dauern.
    </div>
  </div>

  <script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.1.0';

    env.allowLocalModels = false;

    const textInput = document.getElementById('meinText');
    const sendBtn = document.getElementById('sendBtn');
    const statusBox = document.getElementById('status');
    const responseBox = document.getElementById('responseBox');
    const responseText = document.getElementById('responseText');

    let generator = null;
    let isRunning = false;

    async function ladeModell() {
      if (generator) return generator;

      statusBox.textContent = 'Modell wird geladen ... Das kann beim ersten Start 1–3 Minuten dauern.';

      try {
        generator = await pipeline(
          'text-generation',
          'onnx-community/Llama-3.2-1B-Instruct-q4f16',
          { device: 'webgpu' }
        );
        statusBox.textContent = 'Modell ist bereit.';
        return generator;
      } catch (webgpuError) {
        console.warn('WebGPU fehlgeschlagen, wechsle zu Standard-Fallback.', webgpuError);

        statusBox.textContent = 'WebGPU nicht verfügbar. Es wird der langsamere Browser-Fallback geladen ...';

        generator = await pipeline(
          'text-generation',
          'onnx-community/Llama-3.2-1B-Instruct-q4f16'
        );

        statusBox.textContent = 'Modell ist bereit.';
        return generator;
      }
    }

    function bauePrompt(transkript) {
      return `Du bist ein Fachleiter in der Lehrerbildung.

Bewerte das folgende Gesprächstranskript einer Lehrkraft sachlich, konstruktiv und knapp auf Deutsch.

Gib deine Antwort in genau dieser Struktur aus:

1. Gesamteindruck
2. Stärken
3. Schwächen
4. Verbesserungsvorschläge

Schreibe klar, konkret und ohne Einleitungssatz. Beziehe dich nur auf das Transkript.

Transkript:
${transkript}

Feedback:`;
    }

    function bereinigeAntwort(fullText, prompt) {
      if (!fullText) return 'Keine Antwort erzeugt.';
      let text = fullText;

      if (text.startsWith(prompt)) {
        text = text.slice(prompt.length).trim();
      }

      return text.trim() || 'Keine Antwort erzeugt.';
    }

    sendBtn.addEventListener('click', async () => {
      const input = textInput.value.trim();

      if (!input) {
        statusBox.textContent = 'Bitte zuerst ein Transkript einfügen.';
        responseBox.style.display = 'none';
        return;
      }

      if (isRunning) return;

      try {
        isRunning = true;
        sendBtn.disabled = true;
        responseBox.style.display = 'none';
        statusBox.textContent = 'Analyse läuft ...';

        const pipe = await ladeModell();
        const prompt = bauePrompt(input);

        const result = await pipe(prompt, {
          max_new_tokens: 260,
          temperature: 0.2,
          do_sample: false,
          repetition_penalty: 1.1
        });

        const generated = Array.isArray(result)
          ? result[0]?.generated_text
          : result?.generated_text;

        const antwort = bereinigeAntwort(generated, prompt);

        responseText.textContent = antwort;
        responseBox.style.display = 'block';
        statusBox.textContent = 'Fertig.';
      } catch (error) {
        console.error(error);
        statusBox.textContent = 'Fehler beim Laden oder Ausführen des Modells.';
        responseText.textContent =
          'Das lokale Modell konnte auf diesem Gerät oder in diesem Browser nicht sauber ausgeführt werden.';
        responseBox.style.display = 'block';
      } finally {
        isRunning = false;
        sendBtn.disabled = false;
      }
    });

    ladeModell().catch((err) => {
      console.error(err);
      statusBox.textContent = 'Das Modell konnte nicht vorgeladen werden. Du kannst es später erneut versuchen.';
    });
  </script>
</body>
</html>
