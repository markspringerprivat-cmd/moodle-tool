<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transkript-Editor</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
      color: #111;
      overflow-y: auto;
    }

    body {
      display: block;
    }

    .app {
      width: 100%;
      max-width: none;
      padding: 20px;
      box-sizing: border-box;
      margin: 0;
    }

    h1 {
      text-align: left;
      margin: 0 0 10px 0;
    }

    .intro {
      text-align: left;
      color: #444;
      margin-bottom: 20px;
      line-height: 1.5;
      max-width: 1200px;
    }

    .section {
      margin-top: 18px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      background: #fff;
    }

    .metadata-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 12px;
    }

    .source-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-width: 0;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }

    input[type="file"],
    input[type="text"],
    select,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #bbb;
      border-radius: 8px;
      font-size: 15px;
      background: #fff;
      font-family: Arial, sans-serif;
    }

    textarea {
      resize: none;
      overflow-y: hidden;
      line-height: 1.4;
    }

    .speaker-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .speaker-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .speaker-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f5f7fb;
      border: 1px solid #d8dfeb;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
    }

    .speaker-remove {
      background: transparent;
      border: none;
      color: #666;
      cursor: pointer;
      padding: 0;
      margin: 0;
      font-size: 16px;
      line-height: 1;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2d6cdf;
      color: white;
      cursor: pointer;
      font-size: 15px;
      white-space: nowrap;
    }

    button.secondary {
      background: #666;
    }

    button.small-btn {
      padding: 6px 8px;
      font-size: 12px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #444;
    }

    .video-panel {
      margin-top: 14px;
      display: grid;
      grid-template-columns: minmax(320px, 780px) 260px;
      gap: 18px;
      align-items: start;
      justify-content: center;
    }

    .video-column {
      width: 100%;
    }

    .video-shell {
      width: 100%;
      min-height: 0;
      display: none;
    }

    .video-shell.active {
      display: block;
    }

    #localVideo,
    #youtubeContainer {
      width: 100%;
      background: #000;
      border-radius: 12px;
      object-fit: contain;
      display: none;
    }

    #localVideo.active,
    #youtubeContainer.active {
      display: block;
    }

    #localVideo.video-mode {
      height: 460px;
      min-height: 460px;
      max-height: 460px;
    }

    #localVideo.audio-only-local {
      height: 56px;
      min-height: 56px;
      max-height: 56px;
      background: #fff;
      object-fit: initial;
      border-radius: 10px;
    }

    #youtubeContainer.video-mode {
      aspect-ratio: 16 / 9;
      min-height: 460px;
      max-height: 460px;
      overflow: hidden;
    }

    #youtubePlayer {
      width: 100%;
      height: 100%;
    }

    .hidden {
      display: none !important;
    }

    .controls-side {
      background: #ffffff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      display: none;
      flex-direction: column;
      justify-content: flex-start;
    }

    .controls-side.active {
      display: flex;
    }

    .controls-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .controls-stack button,
    .controls-stack select,
    .controls-stack .time-box {
      width: 100%;
      box-sizing: border-box;
    }

    .controls-stack select,
    .controls-under-video select {
      padding: 10px 12px;
      border: 1px solid #bbb;
      border-radius: 8px;
      font-size: 15px;
      background: #fff;
      font-family: Arial, sans-serif;
    }

    .control-group label {
      margin-bottom: 6px;
      font-weight: bold;
    }

    .time-box {
      border: 1px solid #bbb;
      border-radius: 8px;
      padding: 10px 12px;
      background: #f8f8f8;
      font-weight: bold;
      color: #333;
      text-align: center;
    }

    .controls-under-video {
      margin-top: 4px;
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-end;
    }

    .controls-under-video.active {
      display: flex;
    }

    .controls-under-video button,
    .controls-under-video select,
    .controls-under-video .time-box {
      width: auto;
      min-width: 130px;
      box-sizing: border-box;
    }

    .controls-under-video .control-group {
      min-width: 130px;
    }

    .controls-under-video .control-group label {
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .table-scroll-wrap {
      max-height: 420px;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 12px 12px 0 0;
      margin-top: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      margin: 0;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      vertical-align: top;
    }

    th {
      background: #f5f5f5;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .row-actions {
      display: flex;
      gap: 4px;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: flex-start;
      width: 100%;
      box-sizing: border-box;
      overflow: hidden;
    }

    .row-actions .small-btn {
      white-space: nowrap;
      flex: 0 0 auto;
      max-width: 100%;
    }

    .utterance-input {
      min-height: 38px;
      height: 38px;
    }

    .table-add-row-wrap {
      display: flex;
      gap: 8px;
      margin-top: 0;
      justify-content: flex-start;
      flex-wrap: wrap;
    }

    .table-add-row {
      display: inline-block;
      border: 1px solid #cfdcff;
      border-radius: 0 0 8px 8px;
      background: #eef4ff;
      color: #2d6cdf;
      font-weight: 600;
      flex: 0 0 auto;
      width: auto;
      padding: 10px 14px;
    }

    .speaker-blank,
    .pause-blank {
      border: none !important;
      background: transparent !important;
      box-shadow: none !important;
      pointer-events: none;
      color: transparent;
      padding: 10px 0 !important;
    }

    .speaker-continuation {
      border-top: none !important;
    }

    .pause-display {
      color: #444;
      padding: 10px 12px;
      min-height: 38px;
      display: flex;
      align-items: center;
      box-sizing: border-box;
      border: 1px solid transparent;
    }

    @media (max-width: 1200px) {
      .metadata-grid {
        grid-template-columns: 1fr 1fr;
      }

      .source-grid {
        grid-template-columns: 1fr;
      }

      .video-panel {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .metadata-grid {
        grid-template-columns: 1fr;
      }

      .table-add-row-wrap {
        flex-direction: column;
      }

      .controls-under-video.active {
        flex-direction: column;
        align-items: stretch;
      }

      .controls-under-video button,
      .controls-under-video select,
      .controls-under-video .time-box,
      .controls-under-video .control-group {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Transkript-Editor</h1>
    <p class="intro">
      Video laden oder YouTube-Link einfügen, fein navigieren und das Transkript Zeile für Zeile erfassen.
    </p>

    <div class="section card">
      <label>Metadaten</label>
      <div class="metadata-grid">
        <div>
          <label for="metaTitle" style="font-weight:normal;">Videoname</label>
          <input id="metaTitle" type="text" placeholder="z. B. Unterrichtsgespräch Klasse 7" />
        </div>
        <div>
          <label for="metaLength" style="font-weight:normal;">Länge des Ausschnitts</label>
          <input id="metaLength" type="text" placeholder="z. B. 03:25" />
        </div>
        <div>
          <label for="metaSource" style="font-weight:normal;">Quelle</label>
          <input id="metaSource" type="text" placeholder="z. B. Eigenes Video / YouTube-Link" />
        </div>
        <div>
          <label for="metaAuthor" style="font-weight:normal;">Transkribiert von</label>
          <input id="metaAuthor" type="text" placeholder="Name" />
        </div>
      </div>
    </div>

    <div class="section card">
      <label for="speakerInput">Sprecher hinzufügen</label>
      <div class="speaker-input-row">
        <input id="speakerInput" type="text" placeholder="z. B. Lehrkraft, Schüler 1, Schüler 2" />
        <button id="addSpeakerBtn" type="button">+</button>
      </div>

      <div id="speakerTags" class="speaker-tags"></div>
    </div>

    <div class="section card">
      <div class="source-grid">
        <div class="field-group">
          <label for="videoInput">Lokale Videodatei</label>
          <input id="videoInput" type="file" accept="video/*" />
        </div>

        <div class="field-group">
          <label for="youtubeUrl">YouTube-Link</label>
          <input id="youtubeUrl" type="text" placeholder="https://www.youtube.com/watch?v=..." />
        </div>

        <div class="field-group">
          <label style="visibility:hidden;">Aktion</label>
          <button id="loadSourceBtn" type="button">Video laden</button>
        </div>
      </div>

      <div id="sourceStatus" class="status">Noch keine Quelle geladen.</div>

      <div class="video-panel">
        <div class="video-column">
          <div id="videoShell" class="video-shell">
            <video id="localVideo" controls></video>
            <div id="youtubeContainer">
              <div id="youtubePlayer"></div>
            </div>
          </div>

          <div id="controlsUnderVideo" class="controls-under-video">
            <button id="toggleVideoBtnBottom" type="button">Video einblenden</button>
            <button id="playPauseBtnBottom" type="button">Play / Pause</button>
            <button id="backBtnBottom" type="button" class="secondary">Zurück</button>
            <button id="forwardBtnBottom" type="button" class="secondary">Vor</button>
            <button id="insertTimeBtnBottom" type="button">Zeit übernehmen</button>

            <div class="control-group">
              <label>Aktuelle Zeit</label>
              <div class="time-box" id="timeDisplayBottom">00:00.0</div>
            </div>

            <div class="control-group">
              <label for="skipSelectBottom">Sprungweite</label>
              <select id="skipSelectBottom">
                <option value="0.5">0,5 Sek</option>
                <option value="1" selected>1 Sek</option>
                <option value="2">2 Sek</option>
                <option value="5">5 Sek</option>
              </select>
            </div>

            <div class="control-group">
              <label for="speedSelectBottom">Tempo</label>
              <select id="speedSelectBottom">
                <option value="0.5">0.5x</option>
                <option value="0.75">0.75x</option>
                <option value="1" selected>1.0x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2.0x</option>
              </select>
            </div>
          </div>
        </div>

        <div id="controlsCard" class="controls-side">
          <div class="controls-stack">
            <button id="toggleVideoBtn" type="button">Video ausblenden</button>
            <button id="playPauseBtn" type="button">Play / Pause</button>
            <button id="backBtn" type="button" class="secondary">Zurück</button>
            <button id="forwardBtn" type="button" class="secondary">Vor</button>
            <button id="insertTimeBtn" type="button">Zeit übernehmen</button>

            <div class="control-group">
              <label>Aktuelle Zeit</label>
              <div class="time-box" id="timeDisplay">00:00.0</div>
            </div>

            <div class="control-group">
              <label for="skipSelect">Sprungweite</label>
              <select id="skipSelect">
                <option value="0.5">0,5 Sek</option>
                <option value="1" selected>1 Sek</option>
                <option value="2">2 Sek</option>
                <option value="5">5 Sek</option>
              </select>
            </div>

            <div class="control-group">
              <label for="speedSelect">Tempo</label>
              <select id="speedSelect">
                <option value="0.5">0.5x</option>
                <option value="0.75">0.75x</option>
                <option value="1" selected>1.0x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2.0x</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="top-actions">
        <button id="exportTxtBtn" type="button">Als TXT exportieren</button>
        <button id="exportCsvBtn" type="button" class="secondary">Als CSV exportieren</button>
        <button id="copyTranscriptBtn" type="button" class="secondary">In Zwischenablage kopieren</button>
        <button id="analyzeChatgptBtn" type="button">Fertiges Transkript mit ChatGPT analysieren lassen</button>
      </div>

      <div class="table-scroll-wrap" id="tableScrollWrap">
        <table>
          <thead>
            <tr>
              <th style="width: 120px;">Zeit</th>
              <th style="width: 190px;">Sprecher</th>
              <th>Äußerung</th>
              <th style="width: 160px;">Aktionen</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div class="table-add-row-wrap">
        <button id="addSpeakerChangeBtn" type="button" class="table-add-row">+ Sprecherwechsel</button>
        <button id="addSameSpeakerBtn" type="button" class="table-add-row">+ Gleicher Sprecher</button>
        <button id="addPauseBtn" type="button" class="table-add-row">+ Pause</button>
      </div>
    </div>
  </div>

  <script>
    const videoInput = document.getElementById('videoInput');
    const youtubeUrl = document.getElementById('youtubeUrl');
    const loadSourceBtn = document.getElementById('loadSourceBtn');
    const sourceStatus = document.getElementById('sourceStatus');

    const localVideo = document.getElementById('localVideo');
    const youtubeContainer = document.getElementById('youtubeContainer');
    const videoShell = document.getElementById('videoShell');
    const controlsCard = document.getElementById('controlsCard');
    const controlsUnderVideo = document.getElementById('controlsUnderVideo');
    const tableScrollWrap = document.getElementById('tableScrollWrap');

    const toggleVideoBtn = document.getElementById('toggleVideoBtn');
    const toggleVideoBtnBottom = document.getElementById('toggleVideoBtnBottom');

    const playPauseBtn = document.getElementById('playPauseBtn');
    const backBtn = document.getElementById('backBtn');
    const forwardBtn = document.getElementById('forwardBtn');
    const insertTimeBtn = document.getElementById('insertTimeBtn');
    const skipSelect = document.getElementById('skipSelect');
    const speedSelect = document.getElementById('speedSelect');
    const timeDisplay = document.getElementById('timeDisplay');

    const playPauseBtnBottom = document.getElementById('playPauseBtnBottom');
    const backBtnBottom = document.getElementById('backBtnBottom');
    const forwardBtnBottom = document.getElementById('forwardBtnBottom');
    const insertTimeBtnBottom = document.getElementById('insertTimeBtnBottom');
    const skipSelectBottom = document.getElementById('skipSelectBottom');
    const speedSelectBottom = document.getElementById('speedSelectBottom');
    const timeDisplayBottom = document.getElementById('timeDisplayBottom');

    const metaTitle = document.getElementById('metaTitle');
    const metaLength = document.getElementById('metaLength');
    const metaSource = document.getElementById('metaSource');
    const metaAuthor = document.getElementById('metaAuthor');

    const speakerInput = document.getElementById('speakerInput');
    const addSpeakerBtn = document.getElementById('addSpeakerBtn');
    const speakerTags = document.getElementById('speakerTags');

    const exportTxtBtn = document.getElementById('exportTxtBtn');
    const exportCsvBtn = document.getElementById('exportCsvBtn');
    const copyTranscriptBtn = document.getElementById('copyTranscriptBtn');
    const analyzeChatgptBtn = document.getElementById('analyzeChatgptBtn');

    const addSameSpeakerBtn = document.getElementById('addSameSpeakerBtn');
    const addSpeakerChangeBtn = document.getElementById('addSpeakerChangeBtn');
    const addPauseBtn = document.getElementById('addPauseBtn');
    const tableBody = document.getElementById('tableBody');

    let speakerPresets = ['Lehrkraft', 'Schüler 1', 'Schüler 2', 'Schüler 3', 'Schüler 4'];
    let currentSource = null;
    let youtubePlayer = null;
    let youtubeApiReady = false;
    let youtubeTimeInterval = null;
    let videoVisible = true;

    function formatTime(seconds) {
      const s = Math.max(0, Number(seconds) || 0);
      const mins = Math.floor(s / 60);
      const secs = Math.floor(s % 60);
      const tenths = Math.floor((s - Math.floor(s)) * 10);
      return String(mins).padStart(2, '0') + ':' +
             String(secs).padStart(2, '0') + '.' + tenths;
    }

    function parseTimeToSeconds(value) {
      if (!value) return null;
      const trimmed = String(value).trim();
      const match = trimmed.match(/^(\d+):(\d{2})(?:\.(\d))?$/);
      if (!match) return null;
      const mins = Number(match[1]);
      const secs = Number(match[2]);
      const tenths = match[3] ? Number(match[3]) / 10 : 0;
      return mins * 60 + secs + tenths;
    }

    function formatDuration(seconds) {
      if (seconds == null || !isFinite(seconds) || seconds < 0) return '';
      return seconds.toFixed(1) + 's';
    }

    function autoGrowTextarea(el) {
      if (!el) return;
      el.style.height = '38px';
      el.style.height = Math.max(38, el.scrollHeight) + 'px';
    }

    function scrollTableToBottom() {
      tableScrollWrap.scrollTop = tableScrollWrap.scrollHeight;
    }

    function escapeCsv(value) {
      const text = String(value ?? '');
      return '"' + text.replace(/"/g, '""') + '"';
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function syncDisplays() {
      timeDisplayBottom.textContent = timeDisplay.textContent;
      skipSelectBottom.value = skipSelect.value;
      speedSelectBottom.value = speedSelect.value;
    }

    function renderSpeakerTags() {
      speakerTags.innerHTML = '';
      speakerPresets.forEach((speaker, index) => {
        const tag = document.createElement('div');
        tag.className = 'speaker-tag';
        tag.innerHTML = `
          <span>${escapeHtml(speaker)}</span>
          <button type="button" class="speaker-remove" data-index="${index}" aria-label="Sprecher entfernen">×</button>
        `;
        speakerTags.appendChild(tag);
      });

      speakerTags.querySelectorAll('.speaker-remove').forEach(btn => {
        btn.addEventListener('click', () => {
          const index = Number(btn.dataset.index);
          speakerPresets.splice(index, 1);
          renderSpeakerTags();
          refreshAllSpeakerDropdowns();
        });
      });
    }

    function addSpeaker() {
      const value = speakerInput.value.trim();
      if (!value) return;
      if (speakerPresets.includes(value)) {
        speakerInput.value = '';
        return;
      }
      speakerPresets.push(value);
      speakerInput.value = '';
      renderSpeakerTags();
      refreshAllSpeakerDropdowns();
    }

    function buildSpeakerOptions(selected = '') {
      const options = ['<option value="">Bitte wählen</option>']
        .concat(
          speakerPresets.map(name => {
            const isSelected = name === selected ? 'selected' : '';
            return `<option value="${escapeHtml(name)}" ${isSelected}>${escapeHtml(name)}</option>`;
          })
        );
      return options.join('');
    }

    function refreshAllSpeakerDropdowns() {
      const selects = tableBody.querySelectorAll('.speaker-select');
      selects.forEach(select => {
        const currentValue = select.value;
        select.innerHTML = buildSpeakerOptions(currentValue);
        if (speakerPresets.includes(currentValue)) {
          select.value = currentValue;
        }
      });
    }

    function repairSpeakerBorders() {
      const rows = Array.from(tableBody.querySelectorAll('tr'));
      rows.forEach((row, index) => {
        const speakerCell = row.children[1];
        if (!speakerCell) return;
        speakerCell.style.borderBottom = '';
        speakerCell.classList.remove('speaker-continuation');

        const isContinuation = row.classList.contains('continuation-row');
        const prev = rows[index - 1];
        if (isContinuation && prev && !prev.classList.contains('pause-row')) {
          speakerCell.classList.add('speaker-continuation');
          prev.children[1].style.borderBottom = 'none';
        }
      });
    }

    function updatePauseDurations() {
      const rows = Array.from(tableBody.querySelectorAll('tr'));
      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        if (!row.classList.contains('pause-row')) continue;

        const start = parseTimeToSeconds(row.querySelector('.time-input').value.trim());
        const pauseDisplay = row.querySelector('.pause-display');
        if (!pauseDisplay || start == null) {
          pauseDisplay.textContent = '';
          continue;
        }

        let nextTime = null;
        for (let j = i + 1; j < rows.length; j++) {
          const nextRowTime = parseTimeToSeconds(rows[j].querySelector('.time-input').value.trim());
          if (nextRowTime != null) {
            nextTime = nextRowTime;
            break;
          }
        }

        if (nextTime == null || nextTime < start) {
          pauseDisplay.textContent = '';
        } else {
          pauseDisplay.textContent = formatDuration(nextTime - start);
        }
      }
    }

    function attachTimeListeners(tr) {
      const timeInput = tr.querySelector('.time-input');
      if (timeInput) {
        timeInput.addEventListener('input', updatePauseDurations);
        timeInput.addEventListener('change', updatePauseDurations);
      }
    }

    function createStandardRow(time = '', speaker = '', utterance = '', blankSpeaker = false) {
      const tr = document.createElement('tr');

      const speakerCellContent = blankSpeaker
        ? '<div class="speaker-blank">&nbsp;</div>'
        : `<select class="speaker-select">${buildSpeakerOptions(speaker)}</select>`;

      tr.innerHTML = `
        <td><input type="text" class="time-input" value="${escapeHtml(time)}"></td>
        <td>${speakerCellContent}</td>
        <td><textarea class="utterance-input" placeholder="Äußerung eingeben ...">${escapeHtml(utterance)}</textarea></td>
        <td>
          <div class="row-actions">
            <button type="button" class="small-btn use-time-btn">Aktuelle Zeit</button>
            <button type="button" class="small-btn secondary delete-row-btn">Löschen</button>
          </div>
        </td>
      `;

      if (blankSpeaker) tr.classList.add('continuation-row');

      const select = tr.querySelector('.speaker-select');
      if (select) select.value = speaker;

      const textarea = tr.querySelector('.utterance-input');
      autoGrowTextarea(textarea);
      textarea.addEventListener('input', () => autoGrowTextarea(textarea));

      tr.querySelector('.use-time-btn').addEventListener('click', () => {
        tr.querySelector('.time-input').value = formatTime(getCurrentTime());
        updatePauseDurations();
      });

      tr.querySelector('.delete-row-btn').addEventListener('click', () => {
        tr.remove();
        repairSpeakerBorders();
        updatePauseDurations();
      });

      attachTimeListeners(tr);
      tableBody.appendChild(tr);
      repairSpeakerBorders();
      updatePauseDurations();
      scrollTableToBottom();
      return tr;
    }

    function createPauseRow(time = '') {
      const tr = document.createElement('tr');
      tr.classList.add('pause-row');
      tr.innerHTML = `
        <td><input type="text" class="time-input" value="${escapeHtml(time)}"></td>
        <td><div class="pause-blank">&nbsp;</div></td>
        <td><div class="pause-display"></div></td>
        <td>
          <div class="row-actions">
            <button type="button" class="small-btn use-time-btn">Aktuelle Zeit</button>
            <button type="button" class="small-btn secondary delete-row-btn">Löschen</button>
          </div>
        </td>
      `;

      tr.querySelector('.use-time-btn').addEventListener('click', () => {
        tr.querySelector('.time-input').value = formatTime(getCurrentTime());
        updatePauseDurations();
      });

      tr.querySelector('.delete-row-btn').addEventListener('click', () => {
        tr.remove();
        repairSpeakerBorders();
        updatePauseDurations();
      });

      attachTimeListeners(tr);
      tableBody.appendChild(tr);
      repairSpeakerBorders();
      updatePauseDurations();
      scrollTableToBottom();
      return tr;
    }

    function addRowSameSpeaker() {
      const lastRow = tableBody.lastElementChild;
      const afterPause = lastRow && lastRow.classList.contains('pause-row');
      if (afterPause) {
        addRowSpeakerChange();
        return;
      }
      const row = createStandardRow(formatTime(getCurrentTime()), '', '', true);
      row.querySelector('.utterance-input').focus();
    }

    function addRowSpeakerChange() {
      const row = createStandardRow(formatTime(getCurrentTime()), '', '');
      row.querySelector('.speaker-select').focus();
    }

    function addPauseRow() {
      createPauseRow(formatTime(getCurrentTime()));
    }

    function getRowsData() {
      return Array.from(tableBody.querySelectorAll('tr')).map(row => {
        const isPause = row.classList.contains('pause-row');
        const time = row.querySelector('.time-input').value.trim();

        if (isPause) {
          const display = row.querySelector('.pause-display')?.textContent?.trim() || '';
          return { type: 'pause', time, speaker: '', utterance: display };
        }

        const select = row.querySelector('.speaker-select');
        const utterance = row.querySelector('.utterance-input').value.trim();
        const speaker = select ? select.value.trim() : '';
        return { type: 'speech', time, speaker, utterance };
      });
    }

    function getMetadata() {
      return {
        title: metaTitle.value.trim(),
        length: metaLength.value.trim(),
        source: metaSource.value.trim(),
        author: metaAuthor.value.trim()
      };
    }

    function buildMetadataText() {
      const meta = getMetadata();
      return [
        `Videoname: ${meta.title}`,
        `Länge des Ausschnitts: ${meta.length}`,
        `Quelle: ${meta.source}`,
        `Transkribiert von: ${meta.author}`,
        `Sprecher: ${speakerPresets.join(', ')}`
      ].join('\n') + '\n\n';
    }

    function wrapTextByWords(text, maxLen) {
      const input = String(text || '').trim();
      if (!input) return [''];

      const words = input.split(/\s+/);
      const lines = [];
      let current = '';

      for (const word of words) {
        if (!current) {
          current = word;
          continue;
        }

        if ((current + ' ' + word).length <= maxLen) {
          current += ' ' + word;
        } else {
          lines.push(current);
          current = word;
        }
      }

      if (current) lines.push(current);
      return lines;
    }

    function buildTranscriptTxt(rows) {
      const gap = '    ';
      const timeWidth = 10;
      const speakerValues = rows.map(r => r.type === 'pause' ? 'Pause' : (r.speaker || ''));
      const speakerWidth = Math.max(8, ...speakerValues.map(v => String(v).length));
      const maxTextWidth = 70;

      return rows.map(r => {
        const timePart = String(`[${r.time}]`).padEnd(timeWidth, ' ');
        const speakerPart = String(r.type === 'pause' ? 'Pause' : (r.speaker || '')).padEnd(speakerWidth, ' ');
        const prefix = timePart + gap + speakerPart + gap;
        const wrapped = wrapTextByWords(r.utterance || '', maxTextWidth);

        return wrapped.map((line, index) => {
          if (index === 0) return prefix + line;
          return ' '.repeat(prefix.length) + line;
        }).join('\n');
      }).join('\n');
    }

    function buildClipboardText() {
      const rows = getRowsData();
      return buildMetadataText() + buildTranscriptTxt(rows);
    }

    async function copyTextToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch {
        const helper = document.createElement('textarea');
        helper.value = text;
        helper.style.position = 'fixed';
        helper.style.opacity = '0';
        helper.style.left = '-9999px';
        document.body.appendChild(helper);
        helper.focus();
        helper.select();
        let ok = false;
        try {
          ok = document.execCommand('copy');
        } catch {
          ok = false;
        }
        document.body.removeChild(helper);
        return ok;
      }
    }

    function downloadFile(content, filename, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function exportTxt() {
      const content = buildClipboardText();
      downloadFile(content, 'transkript.txt', 'text/plain;charset=utf-8');
    }

    function exportCsv() {
      const rows = getRowsData();
      const meta = getMetadata();

      const lines = [
        ['Metadaten', '', '', '', '', ''].map(escapeCsv).join(';'),
        ['', '', '', '', '', ''].map(escapeCsv).join(';'),
        ['Videoname: ' + meta.title, '', '', '', '', ''].map(escapeCsv).join(';'),
        ['Länge des Ausschnitts: ' + meta.length, '', '', '', '', ''].map(escapeCsv).join(';'),
        ['Quelle: ' + meta.source, '', '', '', '', ''].map(escapeCsv).join(';'),
        ['Transkribiert von: ' + meta.author, '', '', '', '', ''].map(escapeCsv).join(';'),
        ['Sprecher: ' + speakerPresets.join(', '), '', '', '', '', ''].map(escapeCsv).join(';'),
        ['', '', '', '', '', ''].map(escapeCsv).join(';'),
        ['Zeit', 'Sprecher', 'Äußerung'].map(escapeCsv).join(';'),
        ...rows.map(r => [r.time, r.type === 'pause' ? 'Pause' : r.speaker, r.utterance].map(escapeCsv).join(';'))
      ];

      const bom = '\uFEFF';
      downloadFile(bom + lines.join('\n'), 'transkript.csv', 'text/csv;charset=utf-8');
    }

    function getSkipAmount() {
      return Number(skipSelect.value) || 1;
    }

    function getCurrentTime() {
      if (currentSource === 'local') return localVideo.currentTime || 0;
      if (currentSource === 'youtube' && youtubePlayer && youtubePlayer.getCurrentTime) {
        return youtubePlayer.getCurrentTime() || 0;
      }
      return 0;
    }

    function setCurrentTime(seconds) {
      const value = Math.max(0, seconds || 0);
      if (currentSource === 'local') {
        localVideo.currentTime = value;
      } else if (currentSource === 'youtube' && youtubePlayer && youtubePlayer.seekTo) {
        youtubePlayer.seekTo(value, true);
      }
      updateTimeDisplay();
    }

    function togglePlayPause() {
      if (currentSource === 'local') {
        if (localVideo.paused) localVideo.play();
        else localVideo.pause();
      } else if (currentSource === 'youtube' && youtubePlayer) {
        const state = youtubePlayer.getPlayerState();
        if (state === 1) youtubePlayer.pauseVideo();
        else youtubePlayer.playVideo();
      }
    }

    function stepBy(delta) {
      setCurrentTime(getCurrentTime() + delta);
    }

    function setPlaybackRate(rate) {
      if (currentSource === 'local') {
        localVideo.playbackRate = rate;
      } else if (currentSource === 'youtube' && youtubePlayer && youtubePlayer.setPlaybackRate) {
        youtubePlayer.setPlaybackRate(rate);
      }
    }

    function updateTimeDisplay() {
      const t = formatTime(getCurrentTime());
      timeDisplay.textContent = t;
      timeDisplayBottom.textContent = t;
    }

    function updateControlLayout() {
      if (!currentSource) {
        controlsCard.classList.remove('active');
        controlsUnderVideo.classList.remove('active');
        return;
      }

      if (currentSource === 'local' && !videoVisible) {
        controlsCard.classList.remove('active');
        controlsUnderVideo.classList.add('active');
      } else {
        controlsCard.classList.add('active');
        controlsUnderVideo.classList.remove('active');
      }
    }

    function updateVideoVisibility() {
      if (!currentSource) {
        videoShell.classList.remove('active');
        localVideo.classList.remove('active', 'video-mode', 'audio-only-local');
        youtubeContainer.classList.remove('active', 'video-mode');
        controlsCard.classList.remove('active');
        controlsUnderVideo.classList.remove('active');
        return;
      }

      videoShell.classList.add('active');

      if (currentSource === 'local') {
        youtubeContainer.classList.remove('active', 'video-mode');
        localVideo.classList.add('active');

        if (videoVisible) {
          localVideo.classList.add('video-mode');
          localVideo.classList.remove('audio-only-local');
          toggleVideoBtn.textContent = 'Video ausblenden';
          if (toggleVideoBtnBottom) toggleVideoBtnBottom.textContent = 'Video ausblenden';
        } else {
          localVideo.classList.remove('video-mode');
          localVideo.classList.add('audio-only-local');
          toggleVideoBtn.textContent = 'Video einblenden';
          if (toggleVideoBtnBottom) toggleVideoBtnBottom.textContent = 'Video einblenden';
          syncDisplays();
        }
      } else if (currentSource === 'youtube') {
        localVideo.classList.remove('active', 'video-mode', 'audio-only-local');

        if (videoVisible) {
          youtubeContainer.classList.add('active', 'video-mode');
          toggleVideoBtn.textContent = 'Video ausblenden';
          if (toggleVideoBtnBottom) toggleVideoBtnBottom.textContent = 'Video ausblenden';
        } else {
          youtubeContainer.classList.remove('video-mode');
          youtubeContainer.classList.remove('active');
          toggleVideoBtn.textContent = 'Video einblenden';
          if (toggleVideoBtnBottom) toggleVideoBtnBottom.textContent = 'Video einblenden';
          syncDisplays();
        }
      }

      updateControlLayout();
    }

    function setSourceStatus(text) {
      sourceStatus.textContent = text;
    }

    function extractYoutubeId(url) {
      try {
        const parsed = new URL(url);
        if (parsed.hostname.includes('youtu.be')) return parsed.pathname.slice(1);
        if (parsed.hostname.includes('youtube.com')) return parsed.searchParams.get('v');
      } catch {}
      return null;
    }

    function loadYoutubeApi() {
      return new Promise((resolve) => {
        if (youtubeApiReady && window.YT && window.YT.Player) {
          resolve();
          return;
        }

        window.onYouTubeIframeAPIReady = () => {
          youtubeApiReady = true;
          resolve();
        };

        if (!document.querySelector('script[data-youtube-api="1"]')) {
          const script = document.createElement('script');
          script.src = 'https://www.youtube.com/iframe_api';
          script.dataset.youtubeApi = '1';
          document.head.appendChild(script);
        }
      });
    }

    async function loadYoutubeVideo(url) {
      const id = extractYoutubeId(url);
      if (!id) {
        setSourceStatus('Ungültiger YouTube-Link.');
        return;
      }

      await loadYoutubeApi();

      if (youtubePlayer && youtubePlayer.loadVideoById) {
        youtubePlayer.loadVideoById(id);
      } else {
        youtubePlayer = new YT.Player('youtubePlayer', {
          videoId: id,
          playerVars: { rel: 0, modestbranding: 1 },
          events: {
            onReady: () => {
              setPlaybackRate(Number(speedSelect.value));
              updateTimeDisplay();
            }
          }
        });
      }

      currentSource = 'youtube';
      videoVisible = true;
      updateVideoVisibility();
      setSourceStatus('YouTube-Video geladen.');
      if (!metaSource.value.trim()) metaSource.value = url;
      startYoutubeTimePolling();
    }

    function startYoutubeTimePolling() {
      stopYoutubeTimePolling();
      youtubeTimeInterval = setInterval(updateTimeDisplay, 200);
    }

    function stopYoutubeTimePolling() {
      if (youtubeTimeInterval) {
        clearInterval(youtubeTimeInterval);
        youtubeTimeInterval = null;
      }
    }

    function loadSelectedSource() {
      const file = videoInput.files?.[0];
      const url = youtubeUrl.value.trim();

      if (file) {
        const objectUrl = URL.createObjectURL(file);
        localVideo.src = objectUrl;
        localVideo.load();
        stopYoutubeTimePolling();
        currentSource = 'local';
        videoVisible = true;
        updateVideoVisibility();
        setPlaybackRate(Number(speedSelect.value));
        setSourceStatus(`Lokales Video geladen: ${file.name}`);

        if (!metaTitle.value.trim()) metaTitle.value = file.name;
        if (!metaSource.value.trim()) metaSource.value = 'Lokale Videodatei';
        return;
      }

      if (url) {
        loadYoutubeVideo(url);
        return;
      }

      setSourceStatus('Bitte entweder eine lokale Datei auswählen oder einen YouTube-Link eingeben.');
    }

    loadSourceBtn.addEventListener('click', loadSelectedSource);

    toggleVideoBtn.addEventListener('click', () => {
      videoVisible = !videoVisible;
      updateVideoVisibility();
    });

    if (toggleVideoBtnBottom) {
      toggleVideoBtnBottom.addEventListener('click', () => {
        videoVisible = !videoVisible;
        updateVideoVisibility();
      });
    }

    playPauseBtn.addEventListener('click', togglePlayPause);
    backBtn.addEventListener('click', () => stepBy(-getSkipAmount()));
    forwardBtn.addEventListener('click', () => stepBy(getSkipAmount()));
    insertTimeBtn.addEventListener('click', () => {
      const row = createStandardRow(formatTime(getCurrentTime()), '', '');
      row.querySelector('.speaker-select').focus();
    });

    playPauseBtnBottom.addEventListener('click', togglePlayPause);
    backBtnBottom.addEventListener('click', () => stepBy(-(Number(skipSelectBottom.value) || 1)));
    forwardBtnBottom.addEventListener('click', () => stepBy(Number(skipSelectBottom.value) || 1));
    insertTimeBtnBottom.addEventListener('click', () => {
      const row = createStandardRow(formatTime(getCurrentTime()), '', '');
      row.querySelector('.speaker-select').focus();
    });

    skipSelect.addEventListener('change', () => {
      skipSelectBottom.value = skipSelect.value;
    });

    speedSelect.addEventListener('change', () => {
      speedSelectBottom.value = speedSelect.value;
      setPlaybackRate(Number(speedSelect.value));
    });

    skipSelectBottom.addEventListener('change', () => {
      skipSelect.value = skipSelectBottom.value;
    });

    speedSelectBottom.addEventListener('change', () => {
      speedSelect.value = speedSelectBottom.value;
      setPlaybackRate(Number(speedSelectBottom.value));
    });

    addSpeakerBtn.addEventListener('click', addSpeaker);
    speakerInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        addSpeaker();
      }
    });

    addSpeakerChangeBtn.addEventListener('click', addRowSpeakerChange);
    addSameSpeakerBtn.addEventListener('click', addRowSameSpeaker);
    addPauseBtn.addEventListener('click', addPauseRow);

    exportTxtBtn.addEventListener('click', exportTxt);
    exportCsvBtn.addEventListener('click', exportCsv);

    copyTranscriptBtn.addEventListener('click', async () => {
      const text = buildClipboardText();
      const ok = await copyTextToClipboard(text);
      setSourceStatus(ok ? 'Transkript wurde in die Zwischenablage kopiert.' : 'Kopieren in die Zwischenablage hat nicht funktioniert.');
    });

    analyzeChatgptBtn.addEventListener('click', async () => {
      const text = buildClipboardText();
      const ok = await copyTextToClipboard(text);
      window.open('https://chatgpt.com/', '_blank', 'noopener');
      setSourceStatus(ok
        ? 'Transkript wurde kopiert. ChatGPT wurde in einem neuen Tab geöffnet.'
        : 'ChatGPT wurde geöffnet. Das Kopieren in die Zwischenablage hat nicht funktioniert.'
      );
    });

    localVideo.addEventListener('timeupdate', updateTimeDisplay);
    localVideo.addEventListener('loadedmetadata', () => {
      updateTimeDisplay();
      setPlaybackRate(Number(speedSelect.value));
      if (!metaLength.value.trim() && isFinite(localVideo.duration)) {
        metaLength.value = formatTime(localVideo.duration);
      }
    });

    updateVideoVisibility();
    renderSpeakerTags();
    createStandardRow('', 'Lehrkraft', '');
  </script>
</body>
</html>
