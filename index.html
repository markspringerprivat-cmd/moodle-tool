<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transkript-Editor</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
      color: #111;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .app {
      width: min(1100px, 100%);
      padding: 24px;
      box-sizing: border-box;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 10px;
    }

    .intro {
      text-align: center;
      color: #444;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .section {
      margin-top: 24px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }

    input[type="file"], select {
      padding: 10px;
      border: 1px solid #bbb;
      border-radius: 8px;
      font-size: 15px;
      background: #fff;
    }

    video {
      width: 100%;
      max-height: 500px;
      background: #000;
      border-radius: 10px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
      align-items: center;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2d6cdf;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    button.secondary {
      background: #666;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .time-display {
      font-weight: bold;
      color: #333;
      min-width: 120px;
    }

    .speed-box {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      vertical-align: top;
    }

    th {
      background: #f5f5f5;
      text-align: left;
    }

    input[type="text"], textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #bbb;
      border-radius: 6px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      background: #fff;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    .row-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .small-btn {
      padding: 6px 10px;
      font-size: 13px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: #666;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Transkript-Editor</h1>
    <p class="intro">
      Video hochladen, anhalten, in kleinen Schritten vor- und zurückgehen und das Transkript direkt Zeile für Zeile erfassen.
    </p>

    <div class="section">
      <label for="videoInput">Video auswählen</label>
      <input id="videoInput" type="file" accept="video/*" />
    </div>

    <div class="section">
      <video id="videoPlayer" controls></video>

      <div class="controls">
        <button id="playPauseBtn" type="button">Play / Pause</button>
        <button id="back1Btn" type="button" class="secondary">-1 Sek</button>
        <button id="forward1Btn" type="button" class="secondary">+1 Sek</button>
        <button id="insertTimeBtn" type="button">Zeit in neue Zeile übernehmen</button>

        <div class="time-display" id="timeDisplay">00:00.0</div>

        <div class="speed-box">
          <label for="speedSelect" style="margin:0; font-weight:normal;">Tempo</label>
          <select id="speedSelect">
            <option value="0.5">0.5x</option>
            <option value="0.75">0.75x</option>
            <option value="1" selected>1.0x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
          </select>
        </div>
      </div>

      <div class="hint">
        Empfehlung: Mit „-1 Sek“ und „+1 Sek“ fein navigieren, dann für jede Äußerung eine neue Zeile anlegen.
      </div>
    </div>

    <div class="section">
      <div class="top-actions">
        <button id="addRowBtn" type="button">Neue Zeile</button>
        <button id="exportTxtBtn" type="button">Als TXT exportieren</button>
        <button id="exportCsvBtn" type="button" class="secondary">Als CSV exportieren</button>
      </div>

      <table id="transcriptTable">
        <thead>
          <tr>
            <th style="width: 140px;">Zeit</th>
            <th style="width: 160px;">Sprecher</th>
            <th>Äußerung</th>
            <th style="width: 150px;">Aktionen</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const videoInput = document.getElementById('videoInput');
    const videoPlayer = document.getElementById('videoPlayer');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const back1Btn = document.getElementById('back1Btn');
    const forward1Btn = document.getElementById('forward1Btn');
    const insertTimeBtn = document.getElementById('insertTimeBtn');
    const speedSelect = document.getElementById('speedSelect');
    const timeDisplay = document.getElementById('timeDisplay');
    const addRowBtn = document.getElementById('addRowBtn');
    const exportTxtBtn = document.getElementById('exportTxtBtn');
    const exportCsvBtn = document.getElementById('exportCsvBtn');
    const tableBody = document.getElementById('tableBody');

    function formatTime(seconds) {
      const s = Math.max(0, seconds || 0);
      const mins = Math.floor(s / 60);
      const secs = Math.floor(s % 60);
      const tenths = Math.floor((s - Math.floor(s)) * 10);
      return String(mins).padStart(2, '0') + ':' +
             String(secs).padStart(2, '0') + '.' + tenths;
    }

    function escapeCsv(value) {
      const text = String(value ?? '');
      return '"' + text.replace(/"/g, '""') + '"';
    }

    function createRow(time = '', speaker = '', utterance = '') {
      const tr = document.createElement('tr');

      tr.innerHTML = `
        <td><input type="text" class="time-input" value="${time}"></td>
        <td><input type="text" class="speaker-input" value="${speaker}" placeholder="z. B. Lehrkraft, S1"></td>
        <td><textarea class="utterance-input" placeholder="Äußerung eingeben ...">${utterance}</textarea></td>
        <td>
          <div class="row-actions">
            <button type="button" class="small-btn use-time-btn">Aktuelle Zeit</button>
            <button type="button" class="small-btn secondary delete-row-btn">Löschen</button>
          </div>
        </td>
      `;

      tr.querySelector('.use-time-btn').addEventListener('click', () => {
        tr.querySelector('.time-input').value = formatTime(videoPlayer.currentTime);
      });

      tr.querySelector('.delete-row-btn').addEventListener('click', () => {
        tr.remove();
      });

      tableBody.appendChild(tr);
      return tr;
    }

    function getRowsData() {
      return Array.from(tableBody.querySelectorAll('tr')).map(row => ({
        time: row.querySelector('.time-input').value.trim(),
        speaker: row.querySelector('.speaker-input').value.trim(),
        utterance: row.querySelector('.utterance-input').value.trim()
      }));
    }

    function downloadFile(content, filename, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function exportTxt() {
      const rows = getRowsData();
      const lines = rows.map(r => `[${r.time}] ${r.speaker}: ${r.utterance}`);
      downloadFile(lines.join('\\n'), 'transkript.txt', 'text/plain;charset=utf-8');
    }

    function exportCsv() {
      const rows = getRowsData();
      const lines = [
        ['Zeit', 'Sprecher', 'Äußerung'].map(escapeCsv).join(','),
        ...rows.map(r => [r.time, r.speaker, r.utterance].map(escapeCsv).join(','))
      ];
      downloadFile(lines.join('\\n'), 'transkript.csv', 'text/csv;charset=utf-8');
    }

    videoInput.addEventListener('change', () => {
      const file = videoInput.files?.[0];
      if (!file) return;

      const url = URL.createObjectURL(file);
      videoPlayer.src = url;
      videoPlayer.load();
    });

    playPauseBtn.addEventListener('click', () => {
      if (videoPlayer.paused) {
        videoPlayer.play();
      } else {
        videoPlayer.pause();
      }
    });

    back1Btn.addEventListener('click', () => {
      videoPlayer.currentTime = Math.max(0, videoPlayer.currentTime - 1);
    });

    forward1Btn.addEventListener('click', () => {
      const duration = isFinite(videoPlayer.duration) ? videoPlayer.duration : videoPlayer.currentTime + 1;
      videoPlayer.currentTime = Math.min(duration, videoPlayer.currentTime + 1);
    });

    insertTimeBtn.addEventListener('click', () => {
      const row = createRow(formatTime(videoPlayer.currentTime), '', '');
      row.querySelector('.speaker-input').focus();
    });

    speedSelect.addEventListener('change', () => {
      videoPlayer.playbackRate = Number(speedSelect.value);
    });

    addRowBtn.addEventListener('click', () => {
      const row = createRow('', '', '');
      row.querySelector('.time-input').focus();
    });

    exportTxtBtn.addEventListener('click', exportTxt);
    exportCsvBtn.addEventListener('click', exportCsv);

    videoPlayer.addEventListener('timeupdate', () => {
      timeDisplay.textContent = formatTime(videoPlayer.currentTime);
    });

    videoPlayer.addEventListener('loadedmetadata', () => {
      timeDisplay.textContent = formatTime(0);
    });

    createRow('', 'Lehrkraft', '');
  </script>
</body>
</html>
