<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video zu Transkript</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: #ffffff;
      font-family: Arial, sans-serif;
      color: #111;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: #ffffff;
    }

    .app {
      width: min(1000px, 100%);
      padding: 32px 24px 48px;
      box-sizing: border-box;
      background: #ffffff;
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 2.2rem;
    }

    .intro {
      text-align: center;
      margin: 0 0 24px;
      line-height: 1.5;
      color: #333;
    }

    .section {
      margin-top: 24px;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input[type="file"] {
      display: block;
      margin-bottom: 14px;
    }

    video {
      width: 100%;
      max-height: 420px;
      background: #000;
      border-radius: 8px;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      padding: 14px;
      border: 1px solid #bbbbbb;
      border-radius: 8px;
      box-sizing: border-box;
      resize: vertical;
      font-size: 16px;
      font-family: Arial, sans-serif;
      line-height: 1.5;
      background: #fff;
    }

    .button-row {
      margin-top: 18px;
      text-align: center;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      background: #2d6cdf;
      color: white;
      margin: 0 6px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .secondary {
      background: #666;
    }

    .status {
      margin-top: 18px;
      text-align: center;
      min-height: 26px;
      line-height: 1.5;
      color: #333;
    }

    .note {
      margin-top: 16px;
      font-size: 13px;
      line-height: 1.4;
      color: #666;
      text-align: center;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Video zu Transkript</h1>
    <p class="intro">
      Lade ein Video hoch. Die Seite extrahiert lokal die Audiospur und erstellt daraus ein Transkript.
    </p>

    <div class="section">
      <label class="label" for="videoInput">Video auswählen:</label>
      <input id="videoInput" type="file" accept="video/*" />
      <video id="videoPreview" controls class="hidden"></video>
    </div>

    <div class="section">
      <div class="button-row">
        <button id="startBtn" type="button" disabled>Transkript erstellen</button>
        <button id="copyBtn" type="button" class="secondary" disabled>Transkript kopieren</button>
      </div>
      <div id="status" class="status">Noch kein Video ausgewählt.</div>
      <div class="note">
        Der erste Start kann mehrere Minuten dauern, weil Browser-Komponenten und Sprachmodell geladen werden.
      </div>
    </div>

    <div class="section">
      <label class="label" for="transcriptBox">Transkript:</label>
      <textarea id="transcriptBox" placeholder="Hier erscheint das Transkript ..." spellcheck="false"></textarea>
    </div>
  </div>

  <script type="module">
    import { FFmpeg } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js';
    import { fetchFile, toBlobURL } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js';
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.8.1';

    env.allowLocalModels = false;

    const videoInput = document.getElementById('videoInput');
    const videoPreview = document.getElementById('videoPreview');
    const startBtn = document.getElementById('startBtn');
    const copyBtn = document.getElementById('copyBtn');
    const statusBox = document.getElementById('status');
    const transcriptBox = document.getElementById('transcriptBox');

    let selectedFile = null;
    let ffmpeg = null;
    let ffmpegReady = false;
    let transcriber = null;
    let transcriberReady = false;
    let busy = false;

    function setStatus(text) {
      statusBox.textContent = text;
    }

    function setBusy(state) {
      busy = state;
      startBtn.disabled = state || !selectedFile || !ffmpegReady || !transcriberReady;
      copyBtn.disabled = state || !transcriptBox.value.trim();
      videoInput.disabled = state;
    }

    async function ladeFFmpeg() {
      if (ffmpegReady) return ffmpeg;

      setStatus('Videokomponente wird geladen ...');
      ffmpeg = new FFmpeg();

      const base = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm';
      const coreURL = await toBlobURL(`${base}/ffmpeg-core.js`, 'text/javascript');
      const wasmURL = await toBlobURL(`${base}/ffmpeg-core.wasm`, 'application/wasm');

      await ffmpeg.load({
        coreURL,
        wasmURL
      });

      ffmpegReady = true;
      return ffmpeg;
    }

    async function ladeASR() {
      if (transcriberReady) return transcriber;

      setStatus('Sprachmodell wird geladen ...');
      try {
        transcriber = await pipeline(
          'automatic-speech-recognition',
          'Xenova/whisper-tiny',
          { device: 'webgpu' }
        );
      } catch (err) {
        console.warn('WebGPU nicht verfügbar, nutze Fallback.', err);
        setStatus('Sprachmodell wird ohne WebGPU geladen ...');
        transcriber = await pipeline(
          'automatic-speech-recognition',
          'Xenova/whisper-tiny'
        );
      }

      transcriberReady = true;
      return transcriber;
    }

    async function ensureEverythingLoaded() {
      await ladeFFmpeg();
      await ladeASR();
      setStatus('Bereit. Du kannst jetzt ein Video transkribieren.');
      setBusy(false);
    }

    async function extrahiereAudioAlsWav(file) {
      const inputName = 'input_video';
      const outputName = 'audio.wav';

      await ffmpeg.writeFile(inputName, await fetchFile(file));

      // Mono WAV, 16 kHz – passend für ASR-Workflows
      await ffmpeg.exec([
        '-i', inputName,
        '-vn',
        '-ac', '1',
        '-ar', '16000',
        '-f', 'wav',
        outputName
      ]);

      const data = await ffmpeg.readFile(outputName);

      try { await ffmpeg.deleteFile(inputName); } catch {}
      try { await ffmpeg.deleteFile(outputName); } catch {}

      return new Blob([data.buffer], { type: 'audio/wav' });
    }

    async function transkribiereAudio(audioBlob) {
      const audioUrl = URL.createObjectURL(audioBlob);

      try {
        const result = await transcriber(audioUrl, {
          chunk_length_s: 30,
          stride_length_s: 5,
          language: 'german',
          task: 'transcribe',
          return_timestamps: false
        });

        if (typeof result === 'string') return result;
        if (result?.text) return result.text;
        return 'Kein Transkript erzeugt.';
      } finally {
        URL.revokeObjectURL(audioUrl);
      }
    }

    videoInput.addEventListener('change', (event) => {
      const file = event.target.files?.[0] || null;
      selectedFile = file;

      transcriptBox.value = '';
      copyBtn.disabled = true;

      if (!file) {
        videoPreview.classList.add('hidden');
        videoPreview.removeAttribute('src');
        setStatus('Noch kein Video ausgewählt.');
        startBtn.disabled = true;
        return;
      }

      const url = URL.createObjectURL(file);
      videoPreview.src = url;
      videoPreview.classList.remove('hidden');

      if (ffmpegReady && transcriberReady && !busy) {
        startBtn.disabled = false;
        setStatus('Video ausgewählt. Du kannst jetzt das Transkript erstellen.');
      } else {
        setStatus('Video ausgewählt. Komponenten werden vorbereitet ...');
      }
    });

    startBtn.addEventListener('click', async () => {
      if (!selectedFile || busy) return;

      try {
        setBusy(true);
        transcriptBox.value = '';
        setStatus('Audio wird aus dem Video extrahiert ...');

        const audioBlob = await extrahiereAudioAlsWav(selectedFile);

        setStatus('Audio wurde extrahiert. Transkription läuft ...');
        const text = await transkribiereAudio(audioBlob);

        transcriptBox.value = text?.trim() || 'Kein Transkript erzeugt.';
        setStatus('Fertig.');
        copyBtn.disabled = !transcriptBox.value.trim();
      } catch (error) {
        console.error(error);
        transcriptBox.value = '';
        setStatus('Fehler bei Audio-Extraktion oder Transkription.');
      } finally {
        setBusy(false);
      }
    });

    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(transcriptBox.value);
        setStatus('Transkript wurde in die Zwischenablage kopiert.');
      } catch (error) {
        console.error(error);
        setStatus('Kopieren war nicht möglich.');
      }
    });

    // Vorladen
    setBusy(true);
    ensureEverythingLoaded().catch((error) => {
      console.error(error);
      setStatus('Die benötigten Browser-Komponenten konnten nicht vollständig geladen werden.');
      setBusy(false);
    });
  </script>
</body>
</html>
